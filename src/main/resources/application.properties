spring.application.name=Edmilson

# Para definir el puerto donde "escuchará" el servidor
server.port=80

# Para definir el formato de despliegue de fecha/hora del log en la consola
logging.pattern.dateformat=hh:mm

# Para eliminar mensajes invasivos de Spring
spring.main.banner-mode=off

# En desarrollo el "cache" del servidor (false), en producción "true"
spring.thymeleaf.cache=false

# --- CONFIGURACIÓN DE CONEXIÓN LOCAL A MYSQL ---
# URL de conexión con parámetros de seguridad para evitar errores comunes
spring.datasource.url=jdbc:mysql://localhost:3306/techshop?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC

# El usuario y la clave exacta creados por tu script SQL
spring.datasource.username=usuario_prueba
spring.datasource.password=Usuar1o_Clave.

# --- Driver y plataforma de comunicación ---
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Estrategia para que Hibernate respete las tablas que ya creaste con el script
spring.jpa.hibernate.ddl-auto=update

# Mostrar información detallada en el log
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.type.descriptor.sql.BasicBinder=TRACE