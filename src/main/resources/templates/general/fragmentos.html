<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
    
<head th:fragment="head">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>TechShop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css"/>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" defer></script>
</head>
    
<body>

    <header th:fragment="header">
        <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom py-3">
            <div class="container-fluid px-4">
                <a class="navbar-brand fw-bold fs-4" th:href="@{/}" th:text="#{aplicacion.titulo}">TechShop</a>
                
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarTechShop" aria-controls="navbarTechShop" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                
                <div class="collapse navbar-collapse" id="navbarTechShop">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                        <li class="nav-item">
                            <a class="nav-link text-dark px-3" th:href="@{/categorias}" th:text="#{plantilla.categorias}">Categorías</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-dark px-3" th:href="@{/productos}" th:text="#{plantilla.productos}">Productos</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-dark px-3" th:href="@{/consultas}" th:text="#{plantilla.consultas}">Consultas</a>
                        </li>
                        
                        <li class="nav-item dropdown">
                            <a class="nav-link dropdown-toggle text-dark px-3" href="#" id="adminDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false" th:text="#{plantilla.admin}">
                                Administración
                            </a>
                            <ul class="dropdown-menu shadow border-0 mt-2" aria-labelledby="adminDropdown">
                                <li><a class="dropdown-item py-2" th:href="@{/usuarios}" th:text="#{plantilla.usuarios}">Usuarios</a></li>
                                <li><hr class="dropdown-divider"/></li>
                                
                                <li class="dropdown-header fw-bold text-uppercase text-muted" th:text="#{plantilla.seguridad}">Seguridad</li>
                                <li><a class="dropdown-item ps-4 py-1" th:href="@{/roles}" th:text="#{plantilla.troles}">Roles</a></li>
                                <li><a class="dropdown-item ps-4 py-1" th:href="@{/permisos}" th:text="#{plantilla.permisos}">Permisos</a></li>
                                <li><a class="dropdown-item ps-4 py-1" th:href="@{/rutas}" th:text="#{plantilla.rutas}">Rutas</a></li>
                                
                                <li><hr class="dropdown-divider"/></li>
                                <li><a class="dropdown-item py-2" th:href="@{/constantes}" th:text="#{plantilla.constantes}">Constantes</a></li>
                            </ul>
                        </li>
                    </ul>
                    
                    <ul class="navbar-nav mb-2 mb-lg-0">
                        <li class="nav-item dropdown">
                            <a class="nav-link dropdown-toggle text-dark border rounded px-3 bg-light" href="#" id="langDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false" th:text="#{plantilla.idioma}">
                                Idioma
                            </a>
                            <ul class="dropdown-menu dropdown-menu-end shadow border-0 mt-2" aria-labelledby="langDropdown">
                                <li><a class="dropdown-item" th:href="@{/(lang=es)}">Español</a></li>
                                <li><a class="dropdown-item" th:href="@{/(lang=en)}">English</a></li>
                                <li><a class="dropdown-item" th:href="@{/(lang=fr)}">Française</a></li>
                                <li><a class="dropdown-item" th:href="@{/(lang=pt)}">Portugaise</a></li>
                            </ul>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>

        <div class="container-fluid py-4 text-center text-white" style="background-color: #198754;">
            <h1 class="display-5 fw-bold d-flex align-items-center justify-content-center m-0">
                <i class="bi bi-gear-fill me-3"></i>
                <span th:text="#{plantilla.suTienda}">Su tienda en línea</span>
            </h1>
        </div>
    </header>

    <footer th:fragment="footer" class="container-fluid text-white py-3 text-end pe-5" style="background-color: #00c2ee;">
        <p class="m-0 fs-5 fw-semibold">
            <span th:text="#{plantilla.derechos}">TechShop All Rights Reserved</span> © 2025
        </p>
    </footer>

</body>
</html>
